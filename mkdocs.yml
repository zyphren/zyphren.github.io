site_name: 我的个人网站
announcement: "🎉 欢迎访问我的网站！"

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换到亮色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow

nav:
  - 🏡 主页:
      - 首页: index.md
      - 关于我: about.md
      - 课程指引:
          - TEST.md
          - 课程概览: course-guide.md
          - Python 学习: python-study.md
      - Sparke: sparke.md
  - 📚 第二个页面: second.md
  - 📄 第三个页面: third.md
  - 📝 论文:
      - 论文阅读: papers.md
  - 🎲 杂项: others.md
  - 🔗 友链: friends.md

plugins:
  - search:
      separator: '[\s\u200b\-,\.\!\?]'
      lang:
        - zh
        - en
  - blog:
      post_date_format: full
      draft: true
      draft_if_future_date: true
      post_readtime: true
      post_readtime_words_per_minute: 265
      post_url_format: "{date}/{slug}"
      pagination_url_format: "page/{page}"
      authors_file: "{blog}/.authors.yml"
  - glightbox
  - statistics
  - termynal:
      title: ""
      buttons: macos  # 显示 macOS 风格的红黄绿按钮
      prompt_literal_start:
        - "$"
        - ">"
        - "%"
    
markdown_extensions:
  - toc:
      permalink: true
      slugify: !!python/name:pymdownx.slugs.uslugify
  - admonition
#  - neoteroi.cards
#  - neoteroi.timeline
  - pymdownx.details
  - abbr
  - attr_list
  - def_list
  - footnotes
  - tables
  - meta
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tilde
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
      base_path: ["docs"]
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
    




