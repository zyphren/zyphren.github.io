site_name: Zyphren's Blog
# announcement: "🎉 Welcome to my site！"

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到亮色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow

extra_css:
  - extra.css

extra_javascript:
  - extra.js
nav:
  - Home: index.md
  - 📚 第二个页面: 
        - TEST: second/reading.md
        - Writing: second/TEST.md
        - Python 学习: second/python-study.md
  - Courses: 
      - English Proficiency Training: 
         - Speaking: courses/third.md
         - ILETS: courses/IELTS.md
         - CET-6: courses/CET6.md
         - Translation: courses/CET6-T.md
      - Advanced Dynamics: courses/Advanced-Dynamics.md
  - Note: 
      - Thermodynamics: courses/Thermodynamics.md
      - Mechanics: courses/mechanics.md
  - Paper Reading:
      - 论文阅读: papers.md
  - Others: others.md
  - Friends: friends.md

plugins:
  - search:
      separator: '[\s\u200b\-,\.\!\?]'
      lang:
        - zh
        - en
  - blog:
      post_date_format: full
      draft: true
      draft_if_future_date: true
      post_readtime: true
      post_readtime_words_per_minute: 265
      post_url_format: "{date}/{slug}"
      pagination_url_format: "page/{page}"
      authors_file: "{blog}/.authors.yml"
  - glightbox
  - statistics

    
markdown_extensions:
  - toc:
      permalink: true
      slugify: !!python/name:pymdownx.slugs.uslugify
  - admonition
  - neoteroi.cards
  - neoteroi.timeline
  - pymdownx.details
  - abbr
  - attr_list
  - def_list
  - footnotes
  - tables
  - meta
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tilde
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
      base_path: ["docs"]
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.escapeall:
      hardbreak: true  # 单个回车 = 换行
      nbsp: true       # 空格 = 不断行空格

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js 















